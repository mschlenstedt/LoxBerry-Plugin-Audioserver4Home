services:
  loxoneaudioserver:
    container_name: lox-audioserver
    image: ghcr.io/lox-audioserver/lox-audioserver:4.0.0-beta.9
    hostname: lox-audioserver
    restart: unless-stopped
    network_mode: host
    volumes:
      - REPLACELBPCONFIGDIR/data:/app/data
    # privileged caps (and security-opt) needed to mount smb folders within the container
    cap_add:
      - SYS_ADMIN
      - DAC_READ_SEARCH
    # Power Manager note:
    # - gpioset needs the relevant /dev/gpiochip* device inside the container.
    # - USB HID relay boards via crelay need the matching /dev/hidraw* device.
    # - Example for Raspberry Pi 4 header GPIOs and one HID relay:
    # devices:
    #   - /dev/gpiochip0:/dev/gpiochip0
    #   - /dev/hidraw1:/dev/hidraw1
