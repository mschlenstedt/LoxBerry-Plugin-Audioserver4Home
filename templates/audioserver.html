<style>
.datahidden {
	display:none;
}

.tiny {
	font-size:70%;
}

.small {
	font-size:80%;
}

.middle {
	font-size:120%;
}

.big {
	font-size:250%;
}

.large {
	font-size:400%;
}

.bold {
	font-weight: bold;
}

.grayed {
	color: gray;
}

.center {
	text-align: center;
}

.grid {
	display: grid;
	grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
	grid-column-gap: 15px;
	grid-row-gap: 15px;
	text-shadow: none;
}

.box { 
	border: 1px solid black;
	border-radius: 5px 5px 5px 5px;
	padding: 5px;
}

.ui-collapsible .ui-btn {
/*	background-color: #6dac20 !important;
	color: white !important;
	text-shadow: none !important;*/
	border-radius: 5px 5px 5px 5px;
	padding: 15px;
	padding-left: 3.5em;
	vertical-align: middle;
}

.boxrow {
	display: flex;
	flex-flow: row wrap;
	justify-content: center;
	align-items: center;
	padding: 0;
	margin: 0;
}

.boxitem {
	text-align: center;
	vertical-align: middle;
}

.servicestatus {
	display: grid;
	grid-template-columns: auto auto auto auto;
	grid-template-rows: 1fr;
	gap: 0px 10px;
	justify-content: center;
	justify-items: center;
	align-items: center;
	text-shadow: none;
}

.collapsible {
	display: grid;
	grid-template-columns: auto auto auto auto;
	grid-template-rows: 1fr;
	gap: 0px 10px;
	justify-content: left;
	justify-items: left;
	align-items: left;
	text-shadow: none;
}

.margin {
	margin: 10px;
}

.status {
	padding: 7px;
	box-sizing: border-box;
	border-radius: 5px 5px 5px 5px;
	background: #dfdfdf;
	border: 1px solid #7E7E7E;
	width: 170px;
	text-align: center;
}

.ui-popup-container
{
	width:  50%;
	height: 80%;
}

</style>

<div class="servicestatus">
	<div>
		<TMPL_VAR "AUDIOSERVER.LABEL_SERVICE">
	</div>
	<div id="asservicestatusicon">
		<img src="./images/unknown_20.png">
	</div>
	<div class="status" id="asservicestatus">
		<TMPL_VAR "COMMON.HINT_UNKNOWN">
	</div>
	<div>
		<a href="#" onclick="asservicerestart(); return false;" class="ui-btn ui-btn-inline ui-mini ui-btn-icon-left ui-icon-check ui-corner-all"><TMPL_VAR "COMMON.BUTTON_RESTART"></a>
		<a href="#" onclick="asservicestop(); return false;" class="ui-btn ui-btn-inline ui-mini ui-btn-icon-left ui-icon-delete ui-corner-all"><TMPL_VAR "COMMON.BUTTON_STOP"></a>
	</div>

</div>

<hr>

<div data-role="fieldcontain">
	<label for="as_internal"><TMPL_VAR "AUDIOSERVER.LABEL_INTERNAL"></label>
	<input type="checkbox" id="as_internal" name="as_internal" data-role="flipswitch">
</div>

<div data-role="fieldcontain">
	<label for="as_host"><TMPL_VAR "AUDIOSERVER.LABEL_HOST"></label>
	<input type="text" id="as_host" name="as_host" value="">
</div>

<div data-role="fieldcontain">
	<label for="as_port"><TMPL_VAR "AUDIOSERVER.LABEL_PORT"></label>
	<input type="number" id="as_port" name="as_port" min="1" max="65535" value="">
</div>

<a href="#" onclick="as_save_settings(); return false;" class="ui-btn ui-btn-inline ui-mini ui-btn-icon-left ui-icon-check ui-corner-all"><TMPL_VAR "COMMON.BUTTON_SAVE"></a>
<span id="as_savinghint" style="margin-left:10px;"></span>

<br>
<br>
<br>
