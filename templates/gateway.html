<style>
.datahidden {
	display:none;
}

.tiny {
	font-size:70%;
}

.small {
	font-size:80%;
}

.middle {
	font-size:120%;
}

.big {
	font-size:250%;
}

.large {
	font-size:400%;
}

.bold {
	font-weight: bold;
}

.grayed {
	color: gray;
}

.center {
	text-align: center;
}

.grid {
	display: grid;
	grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
	grid-column-gap: 15px;
	grid-row-gap: 15px;
	text-shadow: none;
}

.box { 
	border: 1px solid black;
	border-radius: 5px 5px 5px 5px;
	padding: 5px;
}

.ui-collapsible .ui-btn {
/*	background-color: #6dac20 !important;
	color: white !important;
	text-shadow: none !important;*/
	border-radius: 5px 5px 5px 5px;
	padding: 15px;
	padding-left: 3.5em;
	vertical-align: middle;
}

.boxrow {
	display: flex;
	flex-flow: row wrap;
	justify-content: center;
	align-items: center;
	padding: 0;
	margin: 0;
}

.boxitem {
	text-align: center;
	vertical-align: middle;
}

.servicestatus {
	display: flex;
	flex-wrap: wrap;
	justify-content: center;
	align-items: center;
	gap: 10px;
	text-shadow: none;
	padding: 6px 0;
}

.servicestatus-info {
	display: flex;
	align-items: center;
	gap: 10px;
	flex-wrap: wrap;
	justify-content: center;
}

.servicestatus-btns {
	display: flex;
	flex-wrap: wrap;
	gap: 4px;
	justify-content: center;
	align-items: center;
}

.collapsible {
	display: grid;
	grid-template-columns: auto auto auto auto;
	grid-template-rows: 1fr;
	gap: 0px 10px;
	justify-content: left;
	justify-items: left;
	align-items: left;
	text-shadow: none;
}

.margin {
	margin: 10px;
}

.status {
	padding: 7px 12px;
	box-sizing: border-box;
	border-radius: 5px 5px 5px 5px;
	background: #dfdfdf;
	border: 1px solid #7E7E7E;
	min-width: 130px;
	max-width: 100%;
	text-align: center;
}

.ui-popup-container
{
	width:  50%;
	height: 80%;
}

</style>


<div class="servicestatus">
	<div class="servicestatus-info">
		<div><TMPL_VAR "GATEWAY.LABEL_SERVICE"></div>
		<div id="gwservicestatusicon"><img src="./images/unknown_20.png"></div>
		<div class="status" id="gwservicestatus"><TMPL_VAR "COMMON.HINT_UNKNOWN"></div>
	</div>
	<div class="servicestatus-btns">
		<a href="#" onclick="gwservicerestart(); return false;" class="ui-btn ui-btn-inline ui-mini ui-btn-icon-left ui-icon-check ui-corner-all"><TMPL_VAR "COMMON.BUTTON_RESTART"></a>
		<a href="#" onclick="gwservicestop(); return false;" class="ui-btn ui-btn-inline ui-mini ui-btn-icon-left ui-icon-delete ui-corner-all"><TMPL_VAR "COMMON.BUTTON_STOP"></a>
	</div>
</div>

<hr>

<div data-role="fieldcontain">
	<label for="gw_basetopic"><TMPL_VAR "GATEWAY.LABEL_BASETOPIC"></label>
	<input type="text" id="gw_basetopic" name="gw_basetopic" value="">
</div>

<div data-role="fieldcontain">
	<label for="gw_polling"><TMPL_VAR "GATEWAY.LABEL_POLLING"></label>
	<input type="number" id="gw_polling" name="gw_polling" min="1" value="">
</div>

<div data-role="fieldcontain">
	<label for="gw_polling_slow"><TMPL_VAR "GATEWAY.LABEL_POLLING_SLOW"></label>
	<input type="number" id="gw_polling_slow" name="gw_polling_slow" min="1" value="">
</div>

<div data-role="fieldcontain">
	<label for="gw_miniserver"><TMPL_VAR "GATEWAY.LABEL_MINISERVER"></label>
	<select id="gw_miniserver" name="gw_miniserver">
		<option value=""><TMPL_VAR "GATEWAY.HINT_LOADING_MINISERVERS"></option>
	</select>
</div>

<span id="gw_savinghint"></span>

<br>
<br>
<br>
